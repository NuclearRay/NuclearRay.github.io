<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game Currency Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      body { background: #0f172a; color: #e2e8f0; }
      .navbar { background: #111827; }
      .card { background: #111827; border: 1px solid #1f2937; }
      .form-control, .form-select { background: #0b1220; border: 1px solid #1f2937; color: #e2e8f0; }
      .form-control:focus, .form-select:focus { border-color: #3b82f6; box-shadow: 0 0 0 .2rem rgba(59,130,246,.25); }
      a, .nav-link { color: #93c5fd; }
      .table { color: #e2e8f0; }
      .table thead { color: #93c5fd; }
      .badge-pill { border-radius: 999px; }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">💰 Optimizer</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/optimize">Optimize</a></li>
            <li class="nav-item"><a class="nav-link" href="/exact">Exact/Scaled</a></li>
            <li class="nav-item"><a class="nav-link" href="/spend">Optimize Spend</a></li>
            <li class="nav-item"><a class="nav-link" href="/analyze">Analyze</a></li>
            <li class="nav-item"><a class="nav-link" href="/custom">Custom</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </body>
</html>
