<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game Currency Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">💰 Optimizer</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="#optimize">Optimize</a></li>
            <li class="nav-item"><a class="nav-link" href="#exact">Exact/Scaled</a></li>
            <li class="nav-item"><a class="nav-link" href="#spend">Spend</a></li>
            <li class="nav-item"><a class="nav-link" href="#analyze">Analyze</a></li>
            <li class="nav-item"><a class="nav-link" href="#custom">Custom</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="row g-4">
        <div class="col-12 col-xl-3">
          <div class="card p-3">
            <h5 class="mb-3">Preset</h5>
            <select id="preset" class="form-select mb-2">
              <option value="">Default</option>
              <option value="starter">Starter</option>
              <option value="mid_range">Mid Range</option>
              <option value="premium">Premium</option>
              <option value="league_of_legends">League of Legends</option>
              <option value="custom">Custom</option>
            </select>
            <div class="small text-secondary">Select "Custom" to use the set you define below.</div>
            <hr />
            <div>
              <h6 class="mb-2">Custom Packages</h6>
              <div class="row g-2 align-items-end">
                <div class="col-5">
                  <label class="form-label small">Name</label>
                  <input id="c-name" type="text" class="form-control" placeholder="Mega Bundle" />
                </div>
                <div class="col-3">
                  <label class="form-label small">Cost $</label>
                  <input id="c-cost" type="number" step="0.01" class="form-control" placeholder="9.99" />
                </div>
                <div class="col-3">
                  <label class="form-label small">Coins</label>
                  <input id="c-coins" type="number" class="form-control" placeholder="1300" />
                </div>
                <div class="col-12">
                  <button id="add-custom" class="btn btn-sm btn-primary w-100">Add</button>
                </div>
              </div>
              <div id="custom-list" class="mt-3"></div>
              <button id="clear-custom" class="btn btn-sm btn-outline-danger mt-2 w-100">Clear All</button>
            </div>
          </div>
        </div>

        <div class="col-12 col-xl-9">
          <div class="row g-4">
            <!-- Optimize -->
            <div class="col-12" id="optimize">
              <div class="card p-3">
                <h4 class="mb-3">Optimize Minimum Cost</h4>
                <div class="row g-3 align-items-end">
                  <div class="col-12 col-md-5">
                    <label class="form-label">Target Currency</label>
                    <input id="opt-target" type="number" min="0" class="form-control" placeholder="e.g., 5000" />
                  </div>
                  <div class="col-12 col-md-3">
                    <button id="btn-optimize" class="btn btn-primary w-100">Optimize</button>
                  </div>
                </div>
                <div id="optimize-result" class="mt-3"></div>
              </div>
            </div>

            <!-- Exact -->
            <div class="col-12" id="exact">
              <div class="card p-3">
                <h4 class="mb-3">Exact / Scaled Exact</h4>
                <div class="row g-3 align-items-end">
                  <div class="col-12 col-md-4">
                    <label class="form-label">Target Currency</label>
                    <input id="exact-target" type="number" min="0" class="form-control" placeholder="e.g., 1250" />
                  </div>
                  <div class="col-12 col-md-3">
                    <label class="form-label">Max k</label>
                    <input id="exact-maxk" type="number" min="1" max="100" value="100" class="form-control" />
                  </div>
                  <div class="col-12 col-md-3">
                    <button id="btn-exact" class="btn btn-primary w-100">Find Exact</button>
                  </div>
                </div>
                <div id="exact-result" class="mt-3"></div>
              </div>
            </div>

            <!-- Spend -->
            <div class="col-12" id="spend">
              <div class="card p-3">
                <h4 class="mb-3">Optimize Spend (Budget and Item Costs)</h4>
                <div class="row g-3 align-items-end">
                  <div class="col-12 col-md-3">
                    <label class="form-label">Budget</label>
                    <input id="spend-budget" type="number" min="0" class="form-control" placeholder="e.g., 1000" />
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label">Item Costs (comma-separated)</label>
                    <input id="spend-costs" type="text" class="form-control" placeholder="e.g., 450,200,75" />
                  </div>
                  <div class="col-12 col-md-2">
                    <label class="form-label">Repeatable</label>
                    <select id="spend-repeat" class="form-select">
                      <option value="y">Yes</option>
                      <option value="n">No</option>
                    </select>
                  </div>
                  <div class="col-12 col-md-1">
                    <button id="btn-spend" class="btn btn-primary w-100">Go</button>
                  </div>
                </div>
                <div id="spend-result" class="mt-3"></div>
              </div>
            </div>

            <!-- Analyze -->
            <div class="col-12" id="analyze">
              <div class="card p-3">
                <h4 class="mb-3">Analyze Packages</h4>
                <div id="analyze-result"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
