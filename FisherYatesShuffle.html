<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Card Shuffler</title>
<style>
:root {
  --text: #6b6375;
  --text-h: #08060d;
  --bg: #fff;
  --border: #e5e4e7;
  --code-bg: #f4f3ec;
  --accent: #aa3bff;
  --accent-bg: rgba(170, 59, 255, 0.1);
  --accent-border: rgba(170, 59, 255, 0.5);
  --social-bg: rgba(244, 243, 236, 0.5);
  --shadow: rgba(0,0,0,0.1) 0 10px 15px -3px, rgba(0,0,0,0.05) 0 4px 6px -2px;
  font: 18px/145% system-ui, 'Segoe UI', Roboto, sans-serif;
  letter-spacing: 0.18px;
  color-scheme: light dark;
  color: var(--text);
  background: var(--bg);
}

@media (prefers-color-scheme: dark) {
  :root {
    --text: #9ca3af;
    --text-h: #f3f4f6;
    --bg: #16171d;
    --border: #2e303a;
    --code-bg: #1f2028;
    --accent: #c084fc;
    --accent-bg: rgba(192,132,252,0.15);
    --accent-border: rgba(192,132,252,0.5);
    --social-bg: rgba(47,48,58,0.5);
    --shadow: rgba(0,0,0,0.4) 0 10px 15px -3px, rgba(0,0,0,0.25) 0 4px 6px -2px;
  }
}

body { margin: 0; }
* { box-sizing: border-box; }
#app {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px; width: 100%;
}
h1 { font-size: 56px; letter-spacing: -1.68px; margin: 32px 0; font-weight: 500; color: var(--text-h); }
@media (max-width: 1024px) { h1 { font-size: 36px; margin: 20px 0; } }
.subtitle { margin-top: -1rem; margin-bottom: 2.5rem; font-size: 1rem; }
.setup-card {
  background: var(--bg); border: 1px solid var(--border); padding: 2rem; border-radius: 16px;
  box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 1rem;
  width: 100%; max-width: 400px;
}
.input-group { display: flex; flex-direction: column; gap: 0.5rem; width: 100%; text-align: left; }
.input-group label { font-weight: 600; color: var(--text); }
.input-group input {
  padding: 12px; font-size: 1.2rem; border: 1px solid var(--border); border-radius: 8px;
  background: var(--code-bg); color: var(--text-h);
}
.grid-setup { display: flex; gap: 1rem; width: 100%; }
.grid-setup .input-group { flex: 1; }
.grid-setup input { width: 100%; }
.primary-btn, .nav-btn, .text-btn { cursor: pointer; }
.primary-btn {
  padding: 15px; font-size: 1.1rem; font-weight: bold; background: var(--accent);
  color: white; border: none; border-radius: 8px; transition: opacity 0.2s;
}
.primary-btn:active { opacity: 0.8; }
.status-bar {
  display: flex; justify-content: space-between; align-items: center; width: 100%;
  max-width: 500px; margin-bottom: 2rem; font-weight: 600;
}
.text-btn { background: none; border: none; color: var(--accent); font-weight: bold; padding: 8px; }
.instruction-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 1rem; }
.instruction-subtext { margin-top: 1.5rem; font-size: 1rem; }
.card-display { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; max-width: 500px; }
.card-value {
  font-size: 8rem; font-weight: bold; color: var(--text-h); background: var(--bg);
  border: 4px solid var(--accent); width: 250px; height: 350px; display: flex;
  align-items: center; justify-content: center; border-radius: 20px; box-shadow: var(--shadow); user-select: none;
}
.location-info {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem;
  background: var(--bg); border: 4px solid var(--accent); width: 250px; height: 350px;
  border-radius: 20px; box-shadow: var(--shadow); user-select: none;
}
.row-info { font-size: 1.5rem; color: var(--accent); font-weight: 600; }
.pos-number { font-size: 5rem; font-weight: bold; color: var(--text-h); line-height: 1; }
.pos-label { font-size: 2rem; font-weight: 600; margin-top: 0.5rem; }
.controls { display: flex; gap: 1rem; width: 100%; max-width: 500px; margin-top: 2rem; padding-bottom: 2rem; }
.nav-btn {
  flex: 1; padding: 20px; font-size: 1.2rem; font-weight: bold; border-radius: 12px;
  border: 1px solid var(--border); background: var(--social-bg); color: var(--text-h); transition: all 0.2s;
}
.nav-btn:active:not(:disabled) { background: var(--accent-bg); border-color: var(--accent); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.completion-msg {
  margin-top: 2rem; font-weight: bold; color: var(--accent); font-size: 1.5rem;
  animation: bounce 0.5s infinite alternate;
}
@keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
@media (max-width: 600px) {
  .card-value, .location-info { width: 200px; height: 300px; }
  .card-value { font-size: 6rem; }
  .nav-btn { padding: 15px; }
}
</style>
</head>
<body>
<div id="app"></div>
<script>
function getSuggestedGrid(size) {
  if (size <= 1) return { rows: 1, cols: 1 };
  const perfectPairs = [];
  for (let r = 2; r * r <= size; r++) {
    if (size % r === 0) {
      const c = size / r;
      if (c > 1) {
        const rows = Math.min(r, c), cols = Math.max(r, c);
        perfectPairs.push({ rows, cols });
      }
    }
  }
  if (perfectPairs.length > 0) {
    perfectPairs.sort((a, b) => {
      const dA = Math.abs(a.rows - a.cols), dB = Math.abs(b.rows - b.cols);
      return dA !== dB ? dA - dB : a.rows - b.rows;
    });
    return perfectPairs[0];
  }
  const sqrt = Math.sqrt(size);
  let bestRows = 1, bestCols = size, minDiff = Math.abs(1 - size), minExcess = 1 * size - size;
  for (let r = 1; r <= Math.ceil(sqrt); r++) {
    const c = Math.ceil(size / r);
    const rows = Math.min(r, c), cols = Math.max(r, c);
    const diff = Math.abs(rows - cols), excess = rows * cols - size;
    if (diff < minDiff || (diff === minDiff && excess < minExcess)) {
      minDiff = diff; minExcess = excess; bestRows = rows; bestCols = cols;
    }
  }
  return { rows: bestRows, cols: bestCols };
}

function getOrdinal(n) {
  const j = n % 10, k = n % 100;
  if (j === 1 && k !== 11) return n + 'st';
  if (j === 2 && k !== 12) return n + 'nd';
  if (j === 3 && k !== 13) return n + 'rd';
  return n + 'th';
}

function generatePickSequence(deckSize) {
  const seq = [];
  for (let i = deckSize; i >= 1; i--)
    seq.push(Math.floor(Math.random() * i) + 1);
  return seq;
}

function calculateStepDetails(deckSize, columns, pickSequence) {
  const details = [];
  const present = Array.from({ length: deckSize }, (_, i) => i);
  for (const pick of pickSequence) {
    const idxInHand = pick - 1;
    const absIdx = present[idxInHand];
    const activeRows = [...new Set(present.map(i => Math.floor(i / columns)))].sort((a, b) => a - b);
    const currentRow = Math.floor(absIdx / columns);
    const rowNumber = activeRows.indexOf(currentRow) + 1;
    const cardsInRow = present.filter(i => Math.floor(i / columns) === currentRow);
    const posInRow = cardsInRow.indexOf(absIdx) + 1;
    details.push({ pick, rowNumber, posInRow });
    present.splice(idxInHand, 1);
  }
  return details;
}

const app = document.getElementById('app');
let state = { screen: 'setup', deckSize: '52', rows: '1', cols: '1', steps: [], index: 0 };

function render() {
  if (state.screen === 'setup') renderSetup();
  else renderShuffle();
}

function renderSetup() {
  app.innerHTML = `
    <h1>Physical Card Shuffler</h1>
    <p class="subtitle">Helps you shuffle a physical deck step-by-step</p>
    <div class="setup-card">
      <div class="input-group">
        <label for="deckSize">Number of Cards</label>
        <input id="deckSize" type="number" value="${state.deckSize}" placeholder="e.g. 52" inputmode="numeric" min="1">
      </div>
      <div class="grid-setup">
        <div class="input-group">
          <label for="rows">Rows</label>
          <input id="rows" type="number" value="${state.rows}" placeholder="1" min="1" inputmode="numeric">
        </div>
        <div class="input-group">
          <label for="cols">Columns</label>
          <input id="cols" type="number" value="${state.cols}" placeholder="1" min="1" inputmode="numeric">
        </div>
      </div>
      <button class="primary-btn" id="startBtn">Start Shuffling</button>
    </div>`;

  document.getElementById('deckSize').addEventListener('input', (e) => {
    state.deckSize = e.target.value;
    const size = parseInt(e.target.value) || 0;
    if (size > 0) {
      const { rows, cols } = getSuggestedGrid(size);
      state.rows = String(rows);
      state.cols = String(cols);
      document.getElementById('rows').value = state.rows;
      document.getElementById('cols').value = state.cols;
    }
  });
  document.getElementById('rows').addEventListener('input', (e) => { state.rows = e.target.value; });
  document.getElementById('cols').addEventListener('input', (e) => { state.cols = e.target.value; });
  document.getElementById('startBtn').addEventListener('click', () => {
    const size = parseInt(state.deckSize) || 52;
    const rows = parseInt(state.rows) || 1;
    const cols = parseInt(state.cols) || 1;
    if (rows * cols < size) {
      alert('The grid (' + rows + 'x' + cols + '=' + (rows * cols) + ') is too small for ' + size + ' cards.');
      return;
    }
    const seq = generatePickSequence(size);
    state.steps = calculateStepDetails(size, cols, seq);
    state.index = 0;
    state.screen = 'shuffle';
    render();
  });
}

function renderShuffle() {
  const step = state.steps[state.index];
  const remaining = state.steps.length - state.index;
  const isGrid = (parseInt(state.cols) || 1) > 1 || (parseInt(state.rows) || 1) > 1;

  const pickDisplay = isGrid
    ? `<div class="location-info">
        <div class="row-info">Row ${step.rowNumber}</div>
        <div class="pos-number">${getOrdinal(step.posInRow)}</div>
        <div class="pos-label">card</div>
       </div>`
    : `<div class="card-value">${step.pick}</div>`;

  const subtext = isGrid
    ? `(This is the <strong>${getOrdinal(step.pick)}</strong> card from the top of the remaining ${remaining} cards)`
    : `...from the <strong>${remaining}</strong> cards remaining in your hand.`;

  const complete = state.index === state.steps.length - 1
    ? `<div class="completion-msg">Shuffle Complete!</div>` : '';

  app.innerHTML = `
    <div class="status-bar">
      <span>Step ${state.index + 1} of ${state.steps.length}</span>
      <button class="text-btn" id="resetBtn">Reset</button>
    </div>
    <div class="instruction-text">Pick the card at:</div>
    <div class="card-display">${pickDisplay}</div>
    <div class="instruction-subtext">${subtext}</div>
    <div class="controls">
      <button class="nav-btn" id="prevBtn" ${state.index === 0 ? 'disabled' : ''}>Previous</button>
      <button class="nav-btn" id="nextBtn" ${state.index === state.steps.length - 1 ? 'disabled' : ''}>Next</button>
    </div>
    ${complete}`;

  document.getElementById('resetBtn').addEventListener('click', () => {
    state.screen = 'setup';
    render();
  });
  document.getElementById('prevBtn').addEventListener('click', () => {
    if (state.index > 0) { state.index--; render(); }
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    if (state.index < state.steps.length - 1) { state.index++; render(); }
  });
}

render();
</script>
</body>
</html>
